<!DOCTYPE html>

<html>
  <header>
    <title> Reconcile Medication </title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >
  </header>

  <style>
    /* Only keeping the essential "Tag" logic styling */
    .tag-container { display: flex; flex-wrap: wrap; gap: 5px; align-items: center; }
    .tag { background: var(--pico-primary-background); color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    .remove-btn { margin-left: 6px; cursor: pointer; }
    input[type="text"], input[type="number"] { margin-bottom: 0; } /* Tighten table cells */
    .actions { display: flex; justify-content: center; gap: 10px; margin-top: 1rem; }
  </style>

  <body>
    <main class="container">
      <hgroup>
        <h1>Medication Reconciliation</h1>
        <p>Patient Data Engine</p>
      </hgroup>

      <article>
        <header>Patient Context</header>
        <table id="patient-info">
          <thead>
            <tr>
              <th style="width: 15%;">Age</th>
              <th>Conditions</th>
              <th>Recent Labs</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input type="number" id="patient-age" placeholder="0"></td>
              <td>
                <div class="tag-container" id="condition-tags">
                  <input type="text" id="condition-input" placeholder="Add...">
                </div>
              </td>
              <td>
                <div class="tag-container" id="lab-tags">
                  <input type="text" id="lab-input" placeholder="Add...">
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </article>

      <article>
        <header>Source Systems</header>
        <table id="medication-table">
          <thead>
            <tr>
              <th>System</th>
              <th>Medication & Dosage</th>
              <th>Updated</th>
              <th>Reliability</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="med-body">
            <tr>
              <td><input type="text" placeholder="Source"></td>
              <td><input type="text" placeholder="Med/Dose"></td>
              <td><input type="text" placeholder="YYYY-MM-DD"></td>
              <td><input type="text" placeholder="High/Med/Low"></td>
              <td></td>
            </tr>
          </tbody>
        </table>
        <div class="actions">
          <button class="outline secondary" onclick="addRow()">+ Add Source</button>
          <button onclick="submitReconciliation()">Submit Selection</button>
        </div>
      </article>
    </main>

    <script>
    function addRow() {
      const tbody = document.getElementById('med-body');
      const newRow = document.createElement('tr');

      newRow.innerHTML = `
        <td><input type="text" placeholder="Source System" id="system-source"></td>
        <td><input type="text" placeholder="Medication & Dosage" id="medication-info"></td>
        <td><input type="text" placeholder="YYYY-MM-DD" id="update-date"></td>
        <td><input type="text" placeholder="Reliability" id="reliability"></td>
        <td><button type="button" onclick="this.parentElement.parentElement.remove()">Remove</button></td>
      `;
    
      tbody.appendChild(newRow);
    }

    const condition_input = document.getElementById("condition-input");
    const condition_container = document.getElementById("condition-tags");
    
    condition_input.addEventListener('keydown', (e) => {
      // Check condition_input, not 'input'
      if (e.key === 'Enter' && condition_input.value.trim() !== "") {
        e.preventDefault();
        createTag(condition_input.value.trim(), condition_container, condition_input);
        condition_input.value = "";
      } else if (e.key === 'Backspace' && condition_input.value === "") {
        // Find the last .tag element inside the container
        const tags = condition_container.querySelectorAll('.tag');
        if (tags.length > 0) {
          tags[tags.length - 1].remove();
        }
      }
    });

    const lab_input = document.getElementById("lab-input");
    const lab_container = document.getElementById("lab-tags");
    
    lab_input.addEventListener('keydown', (e) => {
      // Check condition_input, not 'input'
      if (e.key === 'Enter' && lab_input.value.trim() !== "") {
        e.preventDefault();
        createTag(lab_input.value.trim(), lab_container, lab_input);
        lab_input.value = "";
      } else if (e.key === 'Backspace' && lab_input.value === "") {
        // Find the last .tag element inside the container
        const tags = lab_container.querySelectorAll('.tag');
        if (tags.length > 0) {
          tags[tags.length - 1].remove();
        }
      }
    });

    function createTag(text, container, input) {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = `${text} <span class="remove-btn" onclick="this.parentElement.remove()">x</span>`;
      container.insertBefore(tag, input);
    }

    
    function captureData() {

      const patientData = {
        patient_context: {
          age: document.getElementById("patient-age").value,
          conditions: Array.from(document.querySelectorAll("#condition-tags .tag")).map(t => t.textContent.replace('x', '').trim()),
          recent_labs: Array.from(document.querySelectorAll("#lab-tags .tag")).map(t => t.textContent.replace('x', '').trim())
        },
        sources: []
      };

      const rows = document.querySelectorAll('#med-body tr');

      rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        patientData.sources.push({
          system: inputs[0].value,
          medication: inputs[1].value,
          last_updated: inputs[2].value,
          source_reliability: inputs[3].value
        });
      });
      return patientData;
    }

    async function submitReconciliation() {
      const data = captureData();

      try {
        response = await fetch('/api/reconcile/medication', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        if (response.ok) {
          alert("Data submitted");
        } else {
          alert("Server error: " + response.status);
        }
      }
      catch (error) {
        console.error("Fetch error: ", error);
      }
    }

    </script>

  </body>

</html>
